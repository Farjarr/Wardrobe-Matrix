kind = "web"
previewPath = "/wardrobe-pwa/"
title = "Wardrobe PWA"
version = "1.0.0"
id = "artifacts/wardrobe-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/wardrobe-pwa/" ]
localPort = 25941

[services.development]
run = "pnpm --filter @workspace/wardrobe-pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wardrobe-pwa", "run", "build" ]
publicDir = "artifacts/wardrobe-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25941"
BASE_PATH = "/wardrobe-pwa/"
